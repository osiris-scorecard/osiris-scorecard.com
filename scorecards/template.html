<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scorecard — OSIRIS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="nav" id="nav">
  <a href="../index.html" class="nav-logo">
    <span class="nav-logo-text">OSIRIS</span>
  </a>
  <ul class="nav-links">
    <li><a href="../scorecards.html">Scorecards</a></li>
    <li><a href="../methodology.html">Methodology</a></li>
    <li><a href="../about.html">About</a></li>
    <li><a href="../donate.html" class="nav-donate">Donate</a></li>
  </ul>
  <button class="nav-toggle" aria-label="Menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</nav>

<main class="page-wrap">
  <div id="scorecard-content">
    <!-- populated by JS -->
  </div>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-logo">OSIRIS</div>
      <ul class="footer-links">
        <li><a href="../scorecards.html">Scorecards</a></li>
        <li><a href="../methodology.html">Methodology</a></li>
        <li><a href="../about.html">About</a></li>
        <li><a href="../donate.html">Donate</a></li>
      </ul>
      <div class="footer-note">Independent · No right of reply</div>
    </div>
  </div>
</footer>

<script src="../js/main.js"></script>
<script>
  // Get the account ID from the filename
  const id = window.location.pathname.split('/').pop().replace('.html', '');

  fetch('../data/accounts.json')
    .then(r => r.json())
    .then(accounts => {
      const a = accounts.find(x => x.id === id);
      if (!a) {
        document.getElementById('scorecard-content').innerHTML = '<div class="container" style="padding: 8rem 0;"><p style="color: var(--text-muted);">Account not found.</p><a href="../scorecards.html" class="btn btn-ghost" style="margin-top:1rem;">Back to scorecards</a></div>';
        return;
      }

      document.title = `${a.handle} — OSIRIS`;
      const gc = gradeClass(a.cis);
      const color = factBarColor(a.factualityScore);
      const tags = (a.positionTags || []).map(t => `<span class="tag">${t}</span>`).join('');
      const stance = a.stanceSignal ? `<span class="tag tag-stance">${a.stanceSignal}</span>` : '';

      // Hard-visibility flags
      const hardFlags = [];
      if (a.hardFlags) {
        if (a.hardFlags.undisclosedAI) hardFlags.push('<div class="hard-flag">⚠ Undisclosed AI-generated media detected (M6)</div>');
        if (a.hardFlags.manipulated) hardFlags.push('<div class="hard-flag">⚠ Manipulated or doctored media detected (M7)</div>');
      }
      const hardFlagsHTML = hardFlags.length > 0 ? `<div style="margin-top: 2rem;">${hardFlags.join('')}</div>` : '';

      // Content flags
      const contentFlags = (a.contentFlags || []).map(f => `
        <div style="margin-bottom: 1rem;">
          <strong style="color: var(--text-primary);">${f.type}</strong>
          ${f.severity ? `<span style="font-family: 'Inter', sans-serif; font-size: 0.75rem; color: var(--text-muted); margin-left: 0.5rem;">[${f.severity}]</span>` : ''}
          ${f.note ? `<p style="margin-top: 0.25rem; font-size: 0.9rem; color: var(--text-secondary);">${f.note}</p>` : ''}
        </div>
      `).join('');

      // Content pattern notes
      const patternNotes = a.contentPatternNotes ? `<p style="font-size: 0.95rem; line-height: 1.7; padding: 1rem; background: var(--bg-tertiary); border: 1px solid var(--border); border-top: 2px solid var(--primary); border-radius: 6px; margin-top: 1.5rem; color: var(--text-secondary);">${a.contentPatternNotes}</p>` : '';

      document.getElementById('scorecard-content').innerHTML = `
        <div class="scorecard-hero">
          <div class="container">
            <div style="margin-bottom: 1.5rem;">
              <a href="../scorecards.html" style="font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500; color: var(--text-muted);">← All scorecards</a>
            </div>
            <div class="scorecard-header">
              <div class="scorecard-grade-wrap">
                <div class="scorecard-grade-label">CIS Grade</div>
                <div class="grade-badge scorecard-grade-badge ${gc}">${a.cis}</div>
              </div>
              <div class="scorecard-info">
                <div class="scorecard-handle">${a.handle}</div>
                <div class="scorecard-display-name">${a.displayName}</div>
                <div class="card-tags" style="margin-top:0.75rem;">${tags}${stance}</div>
                <div class="scorecard-meta">
                  <div class="scorecard-meta-item">Platform <span>${a.platform}</span></div>
                  <div class="scorecard-meta-item">Focus <span>${a.focus}</span></div>
                  <div class="scorecard-meta-item">Last updated <span>${a.lastUpdated}</span></div>
                </div>
                ${hardFlagsHTML}
              </div>
            </div>
          </div>
        </div>

        <div class="container">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; flex-wrap: wrap; padding-bottom: 3rem;" class="scorecard-body">

            <div>
              <h3 style="font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; color: var(--primary); margin-bottom: 1rem;">Summary</h3>
              <p style="color: var(--text-secondary); font-size: 0.95rem; line-height: 1.8;">${a.summary}</p>

              <div style="margin-top: 2.5rem;">
                <h3 style="font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; color: var(--primary); margin-bottom: 1rem;">Factuality Score</h3>
                <div class="fact-bar-label">
                  <span style="font-family: Georgia, serif; font-size: 2rem; color: var(--text-primary);">${a.factualityScore / 10}</span>
                  <span style="font-family: 'Inter', sans-serif; font-size: 0.9rem; color: var(--text-muted); margin-left: 0.5rem;">/ 10.0</span>
                </div>
                <div class="fact-bar" style="height: 6px; margin-top: 0.5rem;">
                  <div class="fact-bar-fill" style="width:${a.factualityScore}%; background:${color};"></div>
                </div>
              </div>

              ${patternNotes}
            </div>

            <div>
              <h3 style="font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; color: var(--primary); margin-bottom: 1rem;">Review Sample</h3>
              <p style="font-family: 'Inter', sans-serif; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">
                <strong style="font-family: Georgia, serif; font-size: 1.8rem; color: var(--text-primary); display: block; margin-bottom: 0.25rem;">${a.totalPosts}</strong>
                posts reviewed
              </p>
              ${a.pendingPosts > 0 ? `<p style="font-family: 'Inter', sans-serif; font-size: 0.8rem; color: var(--text-muted);">${a.pendingPosts} pending verification</p>` : ''}

              ${contentFlags ? `
              <div style="margin-top: 2.5rem;">
                <h3 style="font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; color: var(--primary); margin-bottom: 1rem;">Content flags</h3>
                ${contentFlags}
              </div>
              ` : ''}
            </div>

          </div>

          <div style="padding: 2rem 0; border-top: 1px solid var(--border-light);">
            <p style="font-family: 'Inter', sans-serif; font-size: 0.8rem; color: var(--text-dim);">
              Individual post classifications and media assessments are not displayed publicly. OSIRIS does not offer a right of reply. Scores are based on reviewed posts only. See <a href="../methodology.html">methodology</a> for full details.
            </p>
          </div>
        </div>
      `;
    });
</script>
</body>
</html>
